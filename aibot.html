<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Conversation Simulator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    input, button, select {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
    }

    input {
      flex: 1;
      min-width: 280px;
      background: #1e293b;
      color: white;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button.secondary {
      background: #334155;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .stat {
      background: #111827;
      padding: 12px 16px;
      border-radius: 14px;
      min-width: 140px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 900px;
      padding: 18px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      animation: fadeIn 0.2s ease;
    }

    .user {
      align-self: flex-start;
      background: #1e293b;
      border-left: 4px solid #38bdf8;
    }

    .assistant {
      align-self: flex-end;
      background: #172554;
      border-left: 4px solid #60a5fa;
    }

    .meta {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      opacity: 0.75;
    }

    .typing {
      opacity: 0.7;
      font-style: italic;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    label {
      font-size: 14px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      padding: 12px 24px;
      background: #020617;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <input
      type="text"
      id="topicInput"
      placeholder="Enter topic... Example: how to use a mini pc to host a public website"
    />

    <button id="startBtn">Start Conversation</button>
    <button class="secondary" id="stopBtn">Stop</button>
    <button class="secondary" id="downloadBtn">Download Logs</button>
  </div>

  <div class="controls">
    <label>
      Max Context Chars:
      <input type="number" id="contextLimit" value="12000" style="width:120px;">
    </label>

    <label>
      Delay (ms):
      <input type="number" id="delayInput" value="1500" style="width:120px;">
    </label>

    <label>
      Max Turns:
      <input type="number" id="turnsInput" value="20" style="width:120px;">
    </label>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Messages</div>
      <div class="stat-value" id="msgCount">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">Estimated Context</div>
      <div class="stat-value" id="ctxSize">0</div>
    </div>

    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="status">Idle</div>
    </div>
  </div>
</header>

<div id="chat"></div>

<div class="footer">
  Automated AI-to-AI conversation simulator
</div>

<script>
  const API_URL = "https://aibot.janzarieldiaz.com/chat";

  const chatEl = document.getElementById("chat");
  const msgCountEl = document.getElementById("msgCount");
  const ctxSizeEl = document.getElementById("ctxSize");
  const statusEl = document.getElementById("status");

  const topicInput = document.getElementById("topicInput");
  const contextLimitInput = document.getElementById("contextLimit");
  const delayInput = document.getElementById("delayInput");
  const turnsInput = document.getElementById("turnsInput");

  let running = false;

  const logs = [];
  const conversation = [];

  const personas = {
    user: `
You are a curious learner.

Rules:
- Always ask follow-up questions.
- Continue the discussion naturally.
- Be conversational.
- Ask for examples, clarification, comparisons, implementation details, troubleshooting, or deeper explanations.
- Avoid ending the conversation.
- Keep responses concise but meaningful.
`,
    assistant: `
You are a highly knowledgeable technical assistant.

Rules:
- Give clear and detailed explanations.
- Continue the discussion naturally.
- Encourage deeper exploration.
- Include practical implementation details.
- Be conversational.
`
  };

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function updateStats() {
    msgCountEl.textContent = conversation.length;

    const size = conversation
      .map(m => m.content)
      .join("\n")
      .length;

    ctxSizeEl.textContent = size;
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function addMessage(role, text, meta = {}) {
    const div = document.createElement("div");
    div.className = `message ${role}`;

    const roleTitle = role === "user"
      ? "USER PERSONA"
      : "ASSISTANT PERSONA";

    div.innerHTML = `
      <strong>${roleTitle}</strong>
      <div style="margin-top:10px;">${escapeHtml(text)}</div>

      <div class="meta">
        duration: ${meta.duration || "-"}<br>
        kb_used: ${meta.kb_used}<br>
        kb_source: ${meta.kb_source || "-"}<br>
        context_chars: ${meta.context_chars || 0}
      </div>
    `;

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;

    updateStats();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function buildTrimmedContext(limit) {
    let result = [];
    let total = 0;

    for (let i = conversation.length - 1; i >= 0; i--) {
      const msg = conversation[i];
      const text = `${msg.role}: ${msg.content}\n`;

      if (total + text.length > limit) {
        break;
      }

      result.unshift(text);
      total += text.length;
    }

    return result.join("\n");
  }

  async function callAPI(role, prompt) {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: prompt
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    return await response.json();
  }

  async function generateMessage(role, topic) {
    const limit = parseInt(contextLimitInput.value);

    const context = buildTrimmedContext(limit);

    let prompt = "";

    if (role === "user") {
      prompt = `
${personas.user}

Topic:
${topic}

Conversation so far:
${context}

Generate the next USER message.
`;
    } else {
      prompt = `
${personas.assistant}

Topic:
${topic}

Conversation so far:
${context}

Generate the next ASSISTANT reply.
`;
    }

    const apiResult = await callAPI(role, prompt);

    return {
      role,
      content: apiResult.reply,
      api: apiResult
    };
  }

  async function runConversation(topic) {
    running = true;

    setStatus("Running");

    const maxTurns = parseInt(turnsInput.value);
    const delay = parseInt(delayInput.value);

    conversation.length = 0;
    logs.length = 0;

    chatEl.innerHTML = "";

    try {
      let currentRole = "user";

      for (let i = 0; i < maxTurns && running; i++) {

        const typing = document.createElement("div");
        typing.className = `message ${currentRole} typing`;
        typing.textContent = `${
          currentRole === "user"
            ? "USER"
            : "ASSISTANT"
        } is thinking...`;

        chatEl.appendChild(typing);
        chatEl.scrollTop = chatEl.scrollHeight;

        const result = await generateMessage(currentRole, topic);

        typing.remove();

        conversation.push({
          role: result.role,
          content: result.content
        });

        logs.push({
          timestamp: new Date().toISOString(),
          role: result.role,
          message: result.content,
          full_api_response: result.api
        });

        addMessage(
          result.role,
          result.content,
          result.api
        );

        currentRole =
          currentRole === "user"
            ? "assistant"
            : "user";

        await sleep(delay);
      }

      setStatus("Finished");

    } catch (err) {
      console.error(err);
      setStatus("Error");
      alert(err.message);
    }

    running = false;
  }

  document.getElementById("startBtn").addEventListener("click", async () => {
    const topic = topicInput.value.trim();

    if (!topic) {
      alert("Enter a topic first.");
      return;
    }

    if (running) return;

    runConversation(topic);
  });

  document.getElementById("stopBtn").addEventListener("click", () => {
    running = false;
    setStatus("Stopped");
  });

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const exportData = {
      topic: topicInput.value,
      exported_at: new Date().toISOString(),
      logs
    };

    const blob = new Blob(
      [JSON.stringify(exportData, null, 2)],
      { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `conversation-${Date.now()}.json`;

    document.body.appendChild(a);
    a.click();

    a.remove();
    URL.revokeObjectURL(url);
  });
</script>

</body>
</html>
