<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Historical Analytics</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .navbar {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .stat-card {
      padding: 1.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .stat-icon {
      width: 72px;
      align-self: stretch;
      border-radius: 16px;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 2rem;
    }

    .bg-primary-subtle {
      background: rgba(59,130,246,0.15);
    }

    .bg-success-subtle {
      background: rgba(34,197,94,0.15);
    }

    .bg-warning-subtle {
      background: rgba(234,179,8,0.15);
    }

    .filter-input {
      background: #1e293b;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
    }

    .filter-input:focus {
      background: #1e293b;
      color: white;
      border-color: #3b82f6;
      box-shadow: none;
    }

    canvas {
      max-height: 400px;
    }

    .chart-card {
      padding: 1.5rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .asof-label {
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
      <span class="navbar-brand text-white fw-bold">
        <i class="bi bi-controller me-2"></i>
        Game Dashboard
      </span>
      <span>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/analytics.html">Analytics</a>
      </span>
    </div>
  </nav>
<div class="container-fluid p-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h2 class="fw-bold mb-1">
        <i class="bi bi-graph-up-arrow me-2"></i>
        Historical Analytics
      </h2>

      <div class="text-secondary">
        User growth, gameplay activity, and sessions over time
      </div>
    </div>

    <div class="card px-4 py-3">
      <div class="small text-secondary">Current Time</div>
      <div id="currentDateTime" class="fw-semibold"></div>
    </div>

  </div>

  <!-- FILTERS -->
  <div class="card p-4 mb-4" style="color: #e2e8f0;">

    <div class="row g-3 align-items-end">

      <div class="col-md-3">
        <label class="form-label">Start Date & Time</label>

        <input
          type="datetime-local"
          id="startDate"
          class="form-control filter-input"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">End Date & Time</label>

        <input
          type="datetime-local"
          id="endDate"
          class="form-control filter-input"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Group By</label>

        <select id="groupBy" class="form-select filter-input">
          <option value="hour">Hour</option>
          <option value="day" selected>Day</option>
          <option value="week">Week</option>
        </select>
      </div>

      <div class="col-md-3">
        <button class="btn btn-primary w-100 py-2" onclick="applyFilters()">
          <i class="bi bi-funnel-fill me-2"></i>
          Apply Filters
        </button>
      </div>

    </div>

  </div>

  <!-- STATS -->
  <div class="row g-4 mb-4">

    <div class="col-md-4">
      <div class="card stat-card">

        <div class="d-flex justify-content-between align-items-stretch gap-3">

          <div>
            <div class="text-secondary mb-1">Users</div>
            <div class="stat-value" id="usersStat">0</div>

            <div class="asof-label" id="usersAsOf"></div>
          </div>

          <div class="stat-icon bg-primary-subtle text-primary">
            <i class="bi bi-people-fill"></i>
          </div>

        </div>

      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card">

        <div class="d-flex justify-content-between align-items-stretch gap-3">

          <div>
            <div class="text-secondary mb-1">Games Played</div>
            <div class="stat-value" id="gamesStat">0</div>

            <div class="asof-label" id="gamesAsOf"></div>
          </div>

          <div class="stat-icon bg-success-subtle text-success">
            <i class="bi bi-controller"></i>
          </div>

        </div>

      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card">

        <div class="d-flex justify-content-between align-items-stretch gap-3">

          <div>
            <div class="text-secondary mb-1">App Sessions</div>
            <div class="stat-value" id="sessionsStat">0</div>

            <div class="asof-label" id="sessionsAsOf"></div>
          </div>

          <div class="stat-icon bg-warning-subtle text-warning">
            <i class="bi bi-phone-fill"></i>
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- CHARTS -->

  <div class="row g-4">

    <div class="col-12">
      <div class="card chart-card">

        <div class="section-title">
          <i class="bi bi-people-fill me-2"></i>
          User Registrations
        </div>

        <canvas id="usersChart"></canvas>

      </div>
    </div>

    <div class="col-12">
      <div class="card chart-card">

        <div class="section-title">
          <i class="bi bi-controller me-2"></i>
          Games Played
        </div>

        <canvas id="gamesChart"></canvas>

      </div>
    </div>

    <div class="col-12">
      <div class="card chart-card">

        <div class="section-title">
          <i class="bi bi-phone-fill me-2"></i>
          App Sessions
        </div>

        <canvas id="sessionsChart"></canvas>

      </div>
    </div>

  </div>

</div>

<script>
  const API_BASE = "https://gravityswing-api.janzarieldiaz.com/api";

  let users = [];
  let games = [];
  let sessions = [];

  let usersChart;
  let gamesChart;
  let sessionsChart;

  async function loadData() {

    const [usersRes, gamesRes, sessionsRes] = await Promise.all([
      fetch(`${API_BASE}/user/list`),
      fetch(`${API_BASE}/game/list`),
      fetch(`${API_BASE}/game/appsessions`)
    ]);

    users = await usersRes.json();
    games = await gamesRes.json();
    sessions = await sessionsRes.json();

    initializeDates();

    applyFilters();

    updateClock();
    setInterval(updateClock, 1000);
  }

  function initializeDates() {

    const now = new Date();

    const weekAgo = new Date();
    weekAgo.setDate(now.getDate() - 7);

    document.getElementById("startDate").value =
      toLocalDateTimeInput(weekAgo);

    document.getElementById("endDate").value =
      toLocalDateTimeInput(now);
  }

  function toLocalDateTimeInput(date) {

    const pad = n => n.toString().padStart(2, "0");

    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  function updateClock() {

    document.getElementById("currentDateTime").textContent =
      new Date().toLocaleString();
  }

  function applyFilters() {

    const start = new Date(document.getElementById("startDate").value);
    const end = new Date(document.getElementById("endDate").value);

    const filteredUsers =
      users.filter(u => new Date(u.lastPlayed) >= start && new Date(u.lastPlayed) <= end);

    const filteredGames =
      games.filter(g => new Date(g.playedAt) >= start && new Date(g.playedAt) <= end);

    const filteredSessions =
      sessions.filter(s => new Date(s.openedAt) >= start && new Date(s.openedAt) <= end);

    updateStats(filteredUsers, filteredGames, filteredSessions, end);

    renderCharts(filteredUsers, filteredGames, filteredSessions);
  }

  function updateStats(filteredUsers, filteredGames, filteredSessions, endDate) {

    document.getElementById("usersStat").textContent =
      filteredUsers.length.toLocaleString();

    document.getElementById("gamesStat").textContent =
      filteredGames.length.toLocaleString();

    document.getElementById("sessionsStat").textContent =
      filteredSessions.length.toLocaleString();

    const asOf = `As of ${endDate.toLocaleString()}`;

    document.getElementById("usersAsOf").textContent = asOf;
    document.getElementById("gamesAsOf").textContent = asOf;
    document.getElementById("sessionsAsOf").textContent = asOf;
  }

  function groupData(data, field) {

    const grouped = {};

    data.forEach(item => {

      const date = new Date(item[field]);

      const key =
        date.toLocaleDateString();

      grouped[key] = (grouped[key] || 0) + 1;
    });

    return grouped;
  }

  function createChart(canvasId, label, dataMap, color) {

    const ctx = document.getElementById(canvasId);

    const labels = Object.keys(dataMap);
    const data = Object.values(dataMap);

    return new Chart(ctx, {
      type: "line",

      data: {
        labels,

        datasets: [{
          label,
          data,
          borderColor: color,
          backgroundColor: color,
          tension: 0.35,
          fill: false
        }]
      },

      options: {
        responsive: true,

        plugins: {
          legend: {
            labels: {
              color: "#e2e8f0"
            }
          }
        },

        scales: {
          x: {
            ticks: {
              color: "#94a3b8"
            },

            grid: {
              color: "rgba(255,255,255,0.05)"
            }
          },

          y: {
            ticks: {
              color: "#94a3b8"
            },

            grid: {
              color: "rgba(255,255,255,0.05)"
            }
          }
        }
      }
    });
  }

  function renderCharts(filteredUsers, filteredGames, filteredSessions) {

    if (usersChart) usersChart.destroy();
    if (gamesChart) gamesChart.destroy();
    if (sessionsChart) sessionsChart.destroy();

    usersChart = createChart(
      "usersChart",
      "Users",
      groupData(filteredUsers, "lastPlayed"),
      "#3b82f6"
    );

    gamesChart = createChart(
      "gamesChart",
      "Games Played",
      groupData(filteredGames, "playedAt"),
      "#22c55e"
    );

    sessionsChart = createChart(
      "sessionsChart",
      "App Sessions",
      groupData(filteredSessions, "openedAt"),
      "#f59e0b"
    );
  }

  loadData();
</script>

</body>
</html>
